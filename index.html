<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quà Tặng 8/3</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Chống tràn viền an toàn và mượt mà, không gây đơ màn hình */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            
            background: linear-gradient(135deg, #4a00e0 0%, #ff0844 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* --- MÀN HÌNH YÊU CẦU XOAY NGANG --- */
        #rotate-warning {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #111;
            z-index: 99999; 
            color: white;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; font-size: 1.5em;
        }
        .phone-icon { font-size: 80px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
        @media screen and (orientation: portrait) { #rotate-warning { display: flex; } }

        /* Nền lấp lánh */
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 0; }

        /* Quản lý Cảnh */
        .scene {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; text-align: center; cursor: pointer; user-select: none;
        }
        .active-scene { display: flex; animation: fadeIn 1.5s ease-in-out forwards; }

        .text-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px 40px; border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            backdrop-filter: blur(10px); max-width: 60%; 
            z-index: 50; 
        }

        h1 { font-size: 2.2em; text-shadow: 0 0 10px #ff99cc; margin-bottom: 10px; }
        p { font-size: 1.2em; line-height: 1.5; margin: 0; }
        .hint { margin-top: 20px; font-size: 0.9em; color: #ffcccc; animation: blink 1.5s infinite; font-style: italic; }
        .icon-large { font-size: 60px; animation: floatIcon 3s ease-in-out infinite; margin-bottom: 15px; }

        /* ẢNH POLAROID TRÊN MÁY TÍNH */
        .photo-card {
            position: absolute;
            width: 100px; height: 100px;
            background: white; padding: 6px 6px 25px 6px;
            border-radius: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            object-fit: cover; transition: transform 0.4s;
            opacity: 0; animation: popIn 1s forwards; pointer-events: auto;
        }
        .photo-card:hover { transform: scale(1.5) !important; z-index: 100; box-shadow: 0 0 30px white; }

        /* MƯA HOA RƠI */
        .falling-flower {
            position: absolute; font-size: 22px;
            top: -20vh;
            opacity: 0; 
            animation: fall linear infinite backwards; 
            z-index: 1; pointer-events: none;
        }

        /* --- THÊM PHẦN NÀY ĐỂ FIX LỖI ĐIỆN THOẠI XOAY NGANG --- */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .text-box { 
                padding: 10px 20px; 
                max-width: 75%; 
            }
            h1 { font-size: 1.5em; margin-bottom: 5px; } 
            p { font-size: 1em; }
            .icon-large { font-size: 40px; margin-bottom: 5px; }
            
            /* Thu nhỏ kích thước ảnh để 11 ảnh không đè nhau */
            .photo-card {
                width: 60px; height: 60px;
                padding: 4px 4px 18px 4px;
            }
        }

        /* KEYFRAMES */
        @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0) rotate(-20deg); } 100% { opacity: 1; } }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }
    </style>
</head>

        <div class="phone-icon">📱</div>
